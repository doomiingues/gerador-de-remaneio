<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Painel de Itens</title>
</head>
<body>

<h1>Painel de Itens</h1>
<div class="inputs-buscar">
    <h3>Buscar por Nome</h3>
    <input type="text" id="buscaNome" placeholder="Digite parte do nome" form autocomplete="off">
    <button onclick="buscarPorNome()">Buscar</button>

    <h3>Buscar por Código</h3>
    <input type="text" id="buscaCodigo" placeholder="Digite o código" form autocomplete="off">
    <button onclick="buscarPorCodigo()">Buscar</button>
</div>

<hr>

<ul id="resultado"></ul>

<script src="app.js"></script>

</body>
</html>
